name: ${COMPOSE_PROJECT_NAME:-folio-takehome}

services:
  app:
    build: .
    working_dir: /app
    volumes:
      - .:/app
    environment:
      - FOLIO_PORT=${FOLIO_PORT:-8000}
      - FOLIO_TZ=${FOLIO_TZ:-America/Chicago}
    ports:
      - "${FOLIO_PORT:-8000}:8000"
    command: sh -c "php seed.php && php -S 0.0.0.0:8000 -t public/"
